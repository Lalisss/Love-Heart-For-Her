<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- 💖 ฟ้อนต์ -->
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

  <title>For My Babe ❤️</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
    }

    /* 💖 canvas ต้อง fix เต็มจอ */
    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
    }

    /* 💌 ข้อความ */
    #loveText {
      position: absolute;
      top: 20%;
      width: 100%;
      text-align: center;
      color: #ffccd5;
      font-size: 40px;
      font-family: 'Pacifico', cursive;

      text-shadow: 
        0 0 10px #ff4d6d,
        0 0 20px #ff4d6d,
        0 0 40px #ff1a4d;

      transition: opacity 1s;
      opacity: 1;

      z-index: 10; /* 👈 สำคัญมาก */
    }
  </style>
</head>

<body>

  <!-- 💌 ข้อความ -->
  <div id="loveText">This is for you ❤️</div>

  <!-- 🎵 เพลง -->
<audio id="bgm" loop muted>
  <source src="https://lalisiss.github.io/Love-Heart-For-Her/music.mp3" type="audio/mpeg">
</audio>

<!-- 🎬 Three.js ตัวหลัก -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<!-- 💖 geometry เสริม -->
<script src="https://threejs.org/examples/js/geometries/ParametricGeometry.js"></script>

<!-- 🚀 script ของเรา -->
<script src="script.js"></script>

</body>
</html>
